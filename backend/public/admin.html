<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval Dashboard | Yarn Roll Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .sidebar {
            background: var(--surface-color);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--nav-border);
        }

        .main-content {
            background: radial-gradient(circle at top right, var(--bg-color), #ffffff);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: var(--accent);
            background: var(--glass-bg);
        }

        .notification-badge {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .btn-approve {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        }

        .btn-approve:hover {
            filter: brightness(1.2);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface-color);
            border-radius: 10px;
        }

        .toast {
            animation: slideIn 0.3s ease-out forwards;
            pointer-events: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.fade-out {
            animation: fadeOut 0.5s ease-in forwards;
        }

        @keyframes fadeOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="/navbar.css">
    <script src="/navbar.js"></script>
</head>

<body class="flex flex-col">
    <!-- Main Content -->
    <main class="flex-1 main-content p-8 min-h-screen">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">New Order Notifications</h2>
                <p class="text-slate-500 mt-1">Review and approve pending warehouse reservations</p>
            </div>
            <div class="relative group">
                <button onclick="toggleNotifications()" class="p-3 glass-card hover:bg-white/10 transition relative">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                        </path>
                    </svg>
                    <span id="notifBadge"
                        class="hidden absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-white notification-badge"></span>
                </button>

                <!-- Notification Dropdown -->
                <div id="notifDropdown"
                    class="hidden absolute right-0 mt-4 w-80 glass-card bg-white shadow-2xl z-50 overflow-hidden">
                    <div class="p-4 border-b border-white/10 flex justify-between items-center">
                        <span class="font-bold">Recent Alerts</span>
                        <span class="text-xs text-blue-400 cursor-pointer">Clear All</span>
                    </div>
                    <div id="notifList" class="max-h-96 overflow-y-auto">
                        <div class="p-4 text-center text-gray-500 text-sm">No new alerts</div>
                    </div>
                </div>
            </div>
            <button onclick="fetchData()" class="p-3 glass-card hover:bg-white/10 transition">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                    </path>
                </svg>
            </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="glass-card p-6 border-l-4 border-orange-500">
                <p class="text-slate-500 text-sm mb-1 uppercase tracking-wider">Pending Orders</p>
                <h3 id="pendingCount" class="text-3xl font-bold text-slate-800">0</h3>
            </div>
            <div class="glass-card p-6 border-l-4 border-emerald-500">
                <p class="text-slate-500 text-sm mb-1 uppercase tracking-wider">Approved Today</p>
                <h3 id="approvedCount" class="text-3xl font-bold text-slate-800">0</h3>
            </div>
            <div class="glass-card p-6 border-l-4 border-amber-500">
                <p class="text-slate-500 text-sm mb-1 uppercase tracking-wider">Reserved Rolls</p>
                <h3 id="reservedCount" class="text-3xl font-bold text-slate-800">0</h3>
            </div>
        </div>

        <!-- Orders Queue -->
        <div id="orderQueue" class="space-y-6">
            <!-- Content loaded via API -->
            <div class="flex items-center justify-center py-20">
                <div class="w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>
    </main>

    <!-- Modal for Approval Status -->
    <div id="statusModal"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass-card bg-white max-w-lg w-full p-8 text-center">
            <div id="modalIcon" class="mb-4 text-emerald-500 mx-auto">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h3 id="modalTitle" class="text-2xl font-bold mb-2">Success</h3>
            <p id="modalMessage" class="text-gray-400 mb-6">Reservation complete.</p>
            <button onclick="closeModal()"
                class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold">CLOSE</button>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-[90px] right-4 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        let lastNotifId = localStorage.getItem('lastSeenNotifId');

        function toggleNotifications() {
            const dropdown = document.getElementById('notifDropdown');
            dropdown.classList.toggle('hidden');
        }

        async function fetchNotifications() {
            try {
                const response = await fetch('/api/notifications');
                const notifs = await response.json();

                // Trigger popup for new notifications
                if (notifs.length > 0) {
                    const latest = notifs[0];
                    if (latest.id !== lastNotifId) {
                        showToast(latest.title, latest.message);
                        lastNotifId = latest.id;
                        localStorage.setItem('lastSeenNotifId', lastNotifId);
                    }
                }

                renderNotifications(notifs);
            } catch (err) { console.error(err); }
        }

        function showToast(title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast glass-card bg-orange-500 text-white p-4 shadow-2xl min-w-[300px] border-l-4 border-white';
            toast.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-bold mb-1">🔔 ${title}</p>
                        <p class="text-sm opacity-90">${message}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-4 opacity-70 hover:opacity-100">✕</button>
                </div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        }

        function renderNotifications(notifs) {
            const container = document.getElementById('notifList');
            const badge = document.getElementById('notifBadge');

            if (notifs.length > 0) {
                badge.classList.remove('hidden');
                container.innerHTML = notifs.map(n => `
                    <div class="p-4 border-b border-slate-200 hover:bg-slate-50 transition cursor-pointer">
                        <p class="text-xs text-orange-500 mb-1">${new Date(n.createdAt).toLocaleTimeString()}</p>
                        <p class="text-sm font-semibold text-slate-800">${n.title}</p>
                        <p class="text-xs text-slate-500 mt-1">${n.message}</p>
                    </div>
                `).join('');
            } else {
                badge.classList.add('hidden');
            }
        }

        async function fetchData() {
            await fetchNotifications();
            await fetchStats();
            try {
                const response = await fetch('/api/orders');
                const orders = await response.json();
                renderQueue(orders);
            } catch (err) {
                console.error(err);
            }
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/dashboard-stats');
                const stats = await response.json();
                document.getElementById('pendingCount').innerText = stats.pendingCount;
                document.getElementById('approvedCount').innerText = stats.approvedTodayCount;
                document.getElementById('reservedCount').innerText = stats.reservedCount;
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }

        function renderQueue(orders) {
            const container = document.getElementById('orderQueue');
            const pendingOrders = orders.filter(o => o.status === 'PENDING');

            if (pendingOrders.length === 0) {
                container.innerHTML = `
                    <div class="glass-card p-12 text-center text-gray-500 border-dashed border-2">
                        <svg class="w-12 h-12 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        All Caught Up! No pending orders.
                    </div>
                `;
                return;
            }

            container.innerHTML = pendingOrders.map(order => `
                <div class="glass-card p-6 flex flex-col lg:flex-row justify-between items-start lg:items-center space-y-4 lg:space-y-0">
                    <div>
                        <div class="flex items-center space-x-3 mb-2">
                            <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-md font-mono">${order.id}</span>
                            <span class="text-xs bg-amber-100 text-amber-600 px-2 py-1 rounded-md font-semibold">NEW ORDER</span>
                        </div>
                        <h4 class="text-xl font-bold text-slate-800 mb-1">${order.customer_name}</h4>
                        <div class="flex space-x-6 text-sm text-slate-500">
                            <span class="flex items-center"><svg class="w-4 h-4 mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>${order.yarn_type}</span>
                            <span class="flex items-center"><svg class="w-4 h-4 mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>${order.quantity} Rolls</span>
                            <span class="flex items-center"><svg class="w-4 h-4 mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${new Date(order.createdAt).toLocaleTimeString()}</span>
                        </div>
                    </div>
                    <div>
                        <button onclick="approveOrder('${order.id}')" class="btn-approve text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-orange-600/20 transition transform hover:scale-105">
                            APPROVE & RESERVE STOCK
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function approveOrder(id) {
            try {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Reserving...';
                btn.disabled = true;

                const response = await fetch(`/api/orders/${id}/approve`, { method: 'POST' });
                const result = await response.json();

                const modal = document.getElementById('statusModal');
                const title = document.getElementById('modalTitle');
                const msg = document.getElementById('modalMessage');

                if (response.ok) {
                    title.innerText = 'Approval Successful';
                    msg.innerText = `Order ${id} processed. ${result.reservedRolls.length} rolls moved to Reserved Collection.`;
                    modal.classList.remove('hidden');
                } else {
                    title.innerText = 'Stock Error';
                    msg.innerText = result.error || 'Failed to reserve stock.';
                    modal.classList.remove('hidden');
                }
                fetchData();
            } catch (err) {
                console.error(err);
            }
        }

        function closeModal() {
            document.getElementById('statusModal').classList.add('hidden');
        }

        fetchData();
        setInterval(fetchData, 5000); // Auto refresh every 5s for real-time feel
    </script>
</body>

</html>
