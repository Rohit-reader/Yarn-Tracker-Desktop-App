<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Approval Dashboard | Yarn Roll Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .sidebar {
            background: var(--surface-color);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--nav-border);
        }

        .main-content {
            background: radial-gradient(circle at top right, var(--bg-color), #ffffff);
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            background: var(--glass-bg);
        }

        .notification-badge {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.1);
                opacity: 0.7;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .btn-approve {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        }

        .btn-approve:hover {
            filter: brightness(1.2);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--surface-color);
            border-radius: 10px;
        }

        .toast {
            animation: slideIn 0.3s ease-out forwards;
            pointer-events: auto;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast.fade-out {
            animation: fadeOut 0.5s ease-in forwards;
        }

        @keyframes fadeOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }

            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }
    </style>
    <link rel="stylesheet" href="/navbar.css">
    <script src="/navbar.js"></script>
</head>

<body class="flex flex-col">
    <!-- Main Content -->
    <main class="flex-1 main-content p-8 min-h-screen">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-3xl font-bold text-slate-800">Admin Approval Panel</h2>
                <p class="text-slate-500 mt-1">Review and approve pending warehouse reservations</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="relative group">
                    <button onclick="toggleNotifications()"
                        class="p-3 glass-card hover:bg-white/10 transition relative">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path
                                d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                            </path>
                        </svg>
                        <span id="notifBadge"
                            class="hidden absolute top-2 right-2 w-3 h-3 bg-red-500 rounded-full border-2 border-white notification-badge"></span>
                    </button>

                    <!-- Notification Dropdown -->
                    <div id="notifDropdown"
                        class="hidden absolute right-0 mt-4 w-80 glass-card bg-white shadow-2xl z-50 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                            <span class="font-bold text-slate-800">Recent Alerts</span>
                            <span class="text-xs text-blue-500 cursor-pointer">Clear All</span>
                        </div>
                        <div id="notifList" class="max-h-96 overflow-y-auto">
                            <div class="p-4 text-center text-gray-500 text-sm">No new alerts</div>
                        </div>
                    </div>
                </div>
                <button id="refresh-btn" onclick="fetchData()"
                    class="p-3 glass-card hover:bg-white/10 transition active:scale-95" title="Refresh Data">
                    <svg id="refresh-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
            <div class="glass-card p-6 border-l-4 border-orange-500">
                <p class="text-slate-500 text-sm mb-1 uppercase tracking-wider">Pending Orders</p>
                <h3 id="pendingCount" class="text-3xl font-bold text-slate-800">0</h3>
            </div>
            <div class="glass-card p-6 border-l-4 border-emerald-500">
                <p class="text-slate-500 text-sm mb-1 uppercase tracking-wider">Approved Today</p>
                <h3 id="approvedCount" class="text-3xl font-bold text-slate-800">0</h3>
            </div>
        </div>

        <!-- Filters -->
        <div class="glass-card p-4 mb-6 flex flex-wrap items-center gap-3">
            <div class="relative" style="flex: 1; min-width: 250px;">
                <input type="text" id="adminSearch" placeholder="Search Customer or Order ID..."
                    style="height: 42px; padding: 0 1rem 0 2.5rem;"
                    class="w-full border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none box-sizing: border-box; background: white;">
                <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>

            <select id="typeFilter" style="height: 42px; min-width: 150px; max-width: 200px;"
                class="px-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 box-sizing: border-box; background: white;">
                <option value="">All Types</option>
            </select>

            <button onclick="applyFilters()" style="height: 42px;"
                class="bg-orange-600 hover:bg-orange-500 text-white px-6 rounded-xl font-bold transition-all active:scale-95 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                SEARCH
            </button>

            <button onclick="clearAllOrders()" style="height: 42px;"
                class="bg-rose-100 hover:bg-rose-200 text-rose-600 px-6 rounded-xl font-bold transition-all active:scale-95 flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                    </path>
                </svg>
                CLEAR ALL
            </button>
        </div>

        <!-- Orders Queue -->
        <div id="orderQueue" class="space-y-6">
            <div class="glass-card p-12 text-center text-gray-500 border-dashed border-2">
                No orders
            </div>
        </div>
    </main>

    <!-- Modal for Approval Status -->
    <div id="statusModal"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="glass-card bg-white max-w-lg w-full p-8 text-center">
            <div id="modalIcon" class="mb-4 text-emerald-500 mx-auto">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h3 id="modalTitle" class="text-2xl font-bold mb-2">Success</h3>
            <p id="modalMessage" class="text-gray-400 mb-6">Reservation complete.</p>
            <button onclick="closeModal()"
                class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold">CLOSE</button>
        </div>
    </div>

    <!-- Custom Confirmation Modal -->
    <div id="confirmModal"
        class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="glass-card bg-white max-w-md w-full p-8 text-center shadow-2xl scale-95 transition-all duration-300"
            id="confirmCard">
            <div id="confirmIcon" class="mb-4 text-rose-500 mx-auto">
                <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z">
                    </path>
                </svg>
            </div>
            <h3 id="confirmTitle" class="text-2xl font-bold mb-2">Confirm Action</h3>
            <p id="confirmMessage" class="text-slate-500 mb-8 leading-relaxed">Are you sure you want to proceed?</p>
            <div class="flex gap-3">
                <button onclick="hideConfirm()"
                    class="flex-1 py-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl font-bold transition">CANCEL</button>
                <button id="confirmBtn"
                    class="flex-1 py-3 bg-rose-600 hover:bg-rose-500 text-white rounded-xl font-bold shadow-lg shadow-rose-600/20 transition">PROCEED</button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer" class="fixed top-[90px] right-4 z-[100] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        let allOrders = [];
        let filteredOrders = [];
        let lastNotifId = localStorage.getItem('lastSeenNotifId');
        let isFetching = false;

        function toggleNotifications() {
            const dropdown = document.getElementById('notifDropdown');
            dropdown.classList.toggle('hidden');
        }

        async function fetchNotifications() {
            try {
                const response = await fetch('/api/notifications');
                const notifs = await response.json();

                if (notifs.length > 0) {
                    const latest = notifs[0];
                    if (latest.id !== lastNotifId) {
                        showToast(latest.title, latest.message);
                        lastNotifId = latest.id;
                        localStorage.setItem('lastSeenNotifId', lastNotifId);
                    }
                }
                renderNotifications(notifs);
            } catch (err) { console.error(err); }
        }

        function showToast(title, message) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = 'toast bg-white border-2 border-orange-500 text-slate-800 p-4 shadow-2xl min-w-[300px] rounded-xl pointer-events-auto';
            toast.style.pointerEvents = 'auto';
            toast.innerHTML = `
                <div class="flex justify-between items-start">
                    <div>
                        <p class="font-bold mb-1 text-orange-600">🔔 ${title}</p>
                        <p class="text-sm text-slate-600 font-medium">${message}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="ml-4 text-slate-400 hover:text-slate-600 transition">✕</button>
                </div>
            `;
            container.appendChild(toast);

            setTimeout(() => {
                toast.classList.add('fade-out');
                setTimeout(() => toast.remove(), 500);
            }, 6000);
        }

        function renderNotifications(notifs) {
            const container = document.getElementById('notifList');
            const badge = document.getElementById('notifBadge');

            if (notifs.length > 0) {
                badge.classList.remove('hidden');
                container.innerHTML = notifs.map(n => `
                    <div class="p-4 border-b border-slate-200 hover:bg-slate-50 transition cursor-pointer">
                        <p class="text-xs text-orange-500 mb-1">${new Date(n.createdAt).toLocaleTimeString()}</p>
                        <p class="text-sm font-semibold text-slate-800">${n.title}</p>
                        <p class="text-xs text-slate-500 mt-1">${n.message}</p>
                    </div>
                `).join('');
            } else {
                badge.classList.add('hidden');
            }
        }

        async function fetchData() {
            if (isFetching) return;
            isFetching = true;

            const icon = document.getElementById('refresh-icon');
            if (icon) icon.classList.add('animate-spin');

            try {
                await fetchNotifications();
                await fetchStats();
                const response = await fetch('/api/orders');
                const newOrders = await response.json();

                // Compare with previous orders to avoid unnecessary re-renders
                if (JSON.stringify(newOrders) !== JSON.stringify(allOrders)) {
                    allOrders = newOrders;
                    updateTypeDropdown();
                    applyFilters(); // Re-apply current filters to new data
                }
            } catch (err) {
                console.error(err);
            } finally {
                isFetching = false;
                if (icon) setTimeout(() => icon.classList.remove('animate-spin'), 500);
            }
        }

        function updateTypeDropdown() {
            const typeSelect = document.getElementById('typeFilter');
            if (!typeSelect) return;

            const currentVal = typeSelect.value;
            const types = [...new Set(allOrders.map(o => o.yarn_type).filter(t => t))];

            typeSelect.innerHTML = '<option value="">All Types</option>';
            types.sort().forEach(t => {
                const opt = document.createElement('option');
                opt.value = t;
                opt.textContent = t;
                typeSelect.appendChild(opt);
            });
            typeSelect.value = currentVal;
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/dashboard-stats');
                const stats = await response.json();
                document.getElementById('pendingCount').innerText = stats.pendingCount;
                document.getElementById('approvedCount').innerText = stats.approvedTodayCount;
            } catch (err) {
                console.error('Error fetching stats:', err);
            }
        }

        function applyFilters() {
            const search = document.getElementById('adminSearch').value.toLowerCase();
            const type = document.getElementById('typeFilter').value.toLowerCase();

            filteredOrders = allOrders.filter(order => {
                if (order.status !== 'PENDING') return false; // Default: Only show pending

                const matchSearch = !search ||
                    order.id.toLowerCase().includes(search) ||
                    order.customer_name.toLowerCase().includes(search);
                const matchType = !type || (order.yarn_type || '').toLowerCase() === type;

                return matchSearch && matchType;
            });

            renderQueue();
        }

        function renderQueue() {
            const container = document.getElementById('orderQueue');

            if (filteredOrders.length === 0) {
                container.innerHTML = `
                    <div class="glass-card p-12 text-center text-gray-500 border-dashed border-2">
                        <svg class="w-12 h-12 mx-auto mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        No orders
                    </div>
                `;
                return;
            }

            container.innerHTML = filteredOrders.map(order => `
                <div class="glass-card p-6 pr-12 flex flex-col lg:flex-row justify-between items-start lg:items-center space-y-4 lg:space-y-0 relative group">
                    <!-- Individual Delete Icon -->
                    <button onclick="deleteOrder('${order.id}')" 
                        class="absolute top-4 right-4 p-2 text-slate-300 hover:text-rose-500 transition-colors md:opacity-0 group-hover:opacity-100"
                        title="Delete Order">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16">
                            </path>
                        </svg>
                    </button>
                    <div>
                        <div class="flex items-center space-x-3 mb-2">
                            <span class="text-xs bg-orange-100 text-orange-600 px-2 py-1 rounded-md font-mono">${order.id}</span>
                            <span class="text-xs bg-amber-100 text-amber-600 px-2 py-1 rounded-md font-semibold">NEW ORDER</span>
                        </div>
                        <h4 class="text-xl font-bold text-slate-800 mb-1">${order.customer_name}</h4>
                        <div class="flex space-x-6 text-sm text-slate-500">
                            <span class="flex items-center"><svg class="w-4 h-4 mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"></path></svg>${order.yarn_type}</span>
                            <span class="flex items-center"><svg class="w-4 h-4 mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>${order.quantity} Rolls</span>
                            <span class="flex items-center"><svg class="w-4 h-4 mr-1 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>${new Date(order.createdAt).toLocaleTimeString()}</span>
                        </div>
                    </div>
                    <div>
                        <button onclick="approveOrder('${order.id}')" class="btn-approve text-white px-8 py-3 rounded-xl font-bold shadow-lg shadow-orange-600/20 transition transform hover:scale-105">
                            APPROVE & RESERVE STOCK
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function approveOrder(id) {
            try {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = 'Reserving...';
                btn.disabled = true;

                const response = await fetch(`/api/orders/${id}/approve`, { method: 'POST' });
                const result = await response.json();

                const modal = document.getElementById('statusModal');
                const title = document.getElementById('modalTitle');
                const msg = document.getElementById('modalMessage');
                const icon = document.getElementById('modalIcon');

                if (response.ok) {
                    title.innerText = 'Approval Successful';
                    msg.innerText = `Order ${id} processed. ${result.reservedRolls.length} rolls moved to Reserved Collection.`;
                    icon.className = 'mb-4 text-emerald-500 mx-auto';
                    icon.innerHTML = '<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>';
                    modal.classList.remove('hidden');
                } else {
                    title.innerText = 'Stock Error';
                    // Use descriptive error from backend, fallback to generic
                    msg.innerText = result.error || 'Failed to approve order.';
                    if (result.detail) {
                        msg.innerHTML += `<br><span class="text-xs text-red-400 mt-2 block font-mono">${result.detail}</span>`;
                    }
                    icon.className = 'mb-4 text-rose-500 mx-auto';
                    icon.innerHTML = '<svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
                    modal.classList.remove('hidden');
                }

                // Fetch explicitly to update UI
                fetchData();
            } catch (err) {
                console.error(err);
            }
        }

        let onConfirmAction = null;

        function showConfirm(title, message, callback, dangerMode = true) {
            const modal = document.getElementById('confirmModal');
            const card = document.getElementById('confirmCard');
            const btn = document.getElementById('confirmBtn');
            const icon = document.getElementById('confirmIcon');

            document.getElementById('confirmTitle').innerText = title;
            document.getElementById('confirmMessage').innerText = message;

            if (dangerMode) {
                btn.className = 'flex-1 py-3 bg-rose-600 hover:bg-rose-500 text-white rounded-xl font-bold shadow-lg shadow-rose-600/20 transition';
                icon.className = 'mb-4 text-rose-500 mx-auto';
            } else {
                btn.className = 'flex-1 py-3 bg-blue-600 hover:bg-blue-500 text-white rounded-xl font-bold shadow-lg shadow-blue-600/20 transition';
                icon.className = 'mb-4 text-blue-500 mx-auto';
            }

            onConfirmAction = () => {
                hideConfirm();
                callback();
            };

            btn.onclick = onConfirmAction;
            modal.classList.remove('hidden');
            setTimeout(() => card.classList.remove('scale-95'), 10);
        }

        function hideConfirm() {
            const modal = document.getElementById('confirmModal');
            const card = document.getElementById('confirmCard');
            card.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        async function deleteOrder(id) {
            showConfirm(
                'Delete Order',
                `Are you sure you want to permanently delete order ${id}?`,
                async () => {
                    try {
                        const response = await fetch(`/api/orders/${id}`, { method: 'DELETE' });
                        if (response.ok) {
                            fetchData();
                            showToast('Deleted', `Order ${id} removed successfully.`);
                        } else {
                            const err = await response.json();
                            alert(err.error || 'Failed to delete order');
                        }
                    } catch (err) { console.error(err); }
                }
            );
        }

        async function clearAllOrders() {
            showConfirm(
                'Clear All Orders',
                '⚠️ This will permanently delete ALL orders. This action cannot be undone. Are you sure?',
                async () => {
                    try {
                        const response = await fetch('/api/orders', { method: 'DELETE' });
                        if (response.ok) {
                            fetchData();
                            showToast('Queue Cleared', 'All orders have been removed.');
                        } else {
                            const err = await response.json();
                            alert(err.error || 'Failed to clear orders');
                        }
                    } catch (err) { console.error(err); }
                }
            );
        }

        function closeModal() {
            document.getElementById('statusModal').classList.add('hidden');
        }

        // Event listeners for instant feedback (optional, but requested search button exists)
        document.getElementById('adminSearch').addEventListener('keyup', (e) => {
            if (e.key === 'Enter') applyFilters();
        });

        fetchData();
        setInterval(fetchData, 5000); 
    </script>
</body>

</html>
