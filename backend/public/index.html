<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>frontend</title>
  <script type="module" crossorigin src="/assets/index-BdKjuw1s.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-7jtnhnhq.css">
  <link rel="stylesheet" href="/navbar.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="/navbar.js"></script>
  <script>
    // Intercept fetch calls to redirect QR creation to testing endpoint
    const originalFetch = window.fetch;
    window.fetch = function () {
      const url = arguments[0];
      const options = arguments[1];
      if (typeof url === 'string' && url.endsWith('/api/rolls') && options && options.method === 'POST') {
        arguments[0] = url.replace('/api/rolls', '/api/test-rolls');
      }
      return originalFetch.apply(this, arguments);
    };

    // UI Style Overrides
    const style = document.createElement('style');
    style.innerHTML = `
      /* ============================================
         PROFESSIONAL MODAL SYSTEM - Z-INDEX HIERARCHY
         ============================================ */
      
      /* Layer 1: Background UI (z-index: 100 and below) */
      .header { position: relative !important; background: white !important; backdrop-filter: none !important; border-bottom: none !important; padding: 2rem !important; margin-bottom: 0 !important; z-index: 100 !important; }
      .header-content { justify-content: flex-end !important; gap: 2rem; }
      .header-content .logo { display: none !important; }
      
      /* Layer 1: Background UI (very low z-index) */
      .header { position: relative !important; background: white !important; backdrop-filter: none !important; border-bottom: none !important; padding: 2rem !important; margin-bottom: 0 !important; z-index: 1 !important; }
      .header-content { justify-content: flex-end !important; gap: 2rem; }
      .header-content .logo { display: none !important; }
      
      #app-navbar, nav { z-index: 1 !important; position: relative !important; }
      #injected-filters { z-index: 1 !important; position: relative !important; }
      
      /* Layer 2: Modal Overlay (MAXIMUM z-index) */
      .ui-overlay,
      .modal-overlay {
        position: fixed !important;
        inset: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background: rgba(0, 0, 0, 0.55) !important;
        z-index: 9999999 !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      
      /* Layer 3: Modal Container (ABOVE OVERLAY) */
      .ui-modal,
      .modal-content {
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        z-index: 10000000 !important;
        background: #ffffff !important;
        border-radius: 14px !important;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35) !important;
        max-height: 85vh !important;
        overflow-y: auto !important;
        margin: 0 !important;
        scrollbar-width: thin;
        scrollbar-color: var(--accent-blue) transparent;
        pointer-events: auto !important;
      }
      
      /* Ensure all modal children are interactive */
      .modal-content *,
      .ui-modal * {
        pointer-events: auto !important;
      }
      
      /* Layer 4: Notification Toasts (ABOVE MODAL) */
      .ui-toast,
      #toastContainer,
      .toast-container,
      .print-preview-toast {
        position: fixed !important;
        top: 24px !important;
        right: 24px !important;
        z-index: 10000001 !important;
        pointer-events: auto !important;
      }
      
      /* Modal Open State - Only prevent body scroll */
      body.modal-open {
        overflow: hidden !important;
      }
      
      /* Notification Style Fixes */
      div[class*="toast"], .toast, #toastContainer > div {
        background: white !important; color: #1e293b !important; border: 2px solid #f97316 !important;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.15) !important; border-radius: 8px !important;
        padding: 12px 24px !important; display: flex !important; align-items: center !important;
      }
      div[class*="toast"]:hover, .toast:hover, #toastContainer > div:hover { background: white !important; border-color: #f97316 !important; }
      
      /* ============================================
         QR RENDERING & GRID STYLES
         ============================================ */
      
      /* Aggressive Sharp QR Rendering */
      .qr-icon, .roll-qr-img, img[src*="qrcodes"], .qr-box img, .roll-qr-box img, canvas { 
        opacity: 1 !important; 
        filter: none !important; 
        image-rendering: -moz-crisp-edges !important;
        image-rendering: -webkit-optimize-contrast !important;
        image-rendering: pixelated !important; 
        image-rendering: crisp-edges !important;
        border: 1px solid #e2e8f0 !important;
        padding: 2px !important;
        background: white !important;
      }

      /* UI Polish: White + Icon */
      button svg, .btn svg { color: white !important; }
      .register-btn svg, .add-roll-btn svg { stroke: white !important; }

      /* Grid Alignment Fixes */
      .roll-card { 
        display: flex !important; flex-direction: column !important; gap: 12px !important;
        padding: 16px !important; min-height: 240px !important; justify-content: space-between !important;
      }
      .roll-header { display: flex !important; justify-content: space-between !important; align-items: flex-start !important; margin-bottom: 8px !important; }
      .roll-number { font-weight: 700 !important; font-size: 1.1rem !important; color: #1e293b !important; white-space: nowrap !important; }
      /* Hide native blurry QRs to prevent duplicates after our injection */
      .qr-box, .roll-qr-box, .qr-icon { display: none !important; }
      .roll-qr-img { width: 64px !important; height: 64px !important; flex-shrink: 0 !important; display: block !important; }
      .roll-details, .roll-info { display: flex !important; flex-direction: column !important; gap: 6px !important; flex: 1 !important; }
      .detail-row, .info-row { display: flex !important; justify-content: space-between !important; align-items: center !important; font-size: 0.9rem !important; }
      .detail-label, .info-label { color: #64748b !important; font-weight: 500 !important; }
      .detail-value, .info-value { color: #334155 !important; font-weight: 600 !important; text-align: right !important; }
    `;
    document.head.appendChild(style);

    // QR script loaded statically

    window.rollBinMap = {};

    // Filter Application Logic
    const applyDOMFilters = () => {
      const search = document.getElementById('inventory-search')?.value.toLowerCase() || '';
      const binF = document.getElementById('filter-bin')?.value || '';
      const typeF = document.getElementById('filter-type')?.value || '';
      const rackF = document.getElementById('filter-rack')?.value.toLowerCase() || '';

      document.querySelectorAll('.roll-card').forEach(card => {
        const idEL = card.querySelector('.roll-number');
        const idStr = idEL?.textContent.trim() || '';
        const idLower = idStr.toLowerCase();

        const typeEL = card.querySelector('.roll-type') || card.querySelector('.yarn-type');
        const typeStr = typeEL?.textContent || card.textContent || '';
        const rackEL = card.querySelector('.roll-rack') || card.querySelector('.rack-id');
        const rackStr = rackEL?.textContent.toLowerCase() || card.textContent.toLowerCase();

        if (idLower.includes('test')) { card.style.display = 'none'; return; }

        // Get bin from global map
        const bin = window.rollBinMap[idStr] || card.getAttribute('data-bin') || '';

        const binMatch = !binF || bin === binF;
        const searchMatch = !search || idLower.includes(search) || typeStr.toLowerCase().includes(search) ||
          rackStr.includes(search);
        const typeMatch = !typeF || typeStr.includes(typeF);
        const rackMatch = !rackF || rackStr.includes(rackF);

        card.style.display = (binMatch && searchMatch && typeMatch && rackMatch) ? 'flex' : 'none';
      });
    };

    window.addEventListener('DOMContentLoaded', () => {
      const injectFilters = () => {
        if (document.getElementById('injected-filters')) return;
        const mainContent = document.querySelector('.header');
        if (mainContent) {
          const filterBar = document.createElement('div');
          filterBar.id = 'injected-filters';
          filterBar.style.cssText = 'display: flex; gap: 1rem; padding: 1rem 2rem; background: #fff; border-bottom: 1px solid
          #e1e8f0; align - items: center; z - index: 50; position: relative; margin - top: 1rem; box - shadow: 0 4px 6px - 1px
          rgba(0, 0, 0, 0.05); ';
          filterBar.innerHTML = `
  <div style="flex: 1; position: relative;"><input type="text" id="inventory-search"
      placeholder="Search by ID, Lot, Supplier..."
      style="width: 100%; padding: 0.5rem 1rem 0.5rem 2.5rem; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; background: white;"><svg
      style="position: absolute; left: 0.75rem; top: 50%; transform: translateY(-50%); width: 1.25rem; height: 1.25rem; color: #94a3b8;"
      fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
    </svg></div>
  <select id="filter-bin"
    style="padding: 0.5rem; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; background: white;">
    <option value="">All Bins</option>
    <option value="1">Bin 1</option>
    <option value="2">Bin 2</option>
    <option value="3">Bin 3</option>
    <option value="4">Bin 4</option>
    <option value="5">Bin 5</option>
    <option value="6">Bin 6</option>
    <option value="7">Bin 7</option>
    <option value="8">Bin 8</option>
    <option value="9">Bin 9</option>
  </select>
  <select id="filter-type"
    style="padding: 0.5rem; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; background: white; max-width: 150px;">
    <option value="">All Types</option>
  </select>
  <input type="text" id="filter-rack" placeholder="Rack"
    style="width: 80px; padding: 0.5rem; border-radius: 8px; border: 1px solid #cbd5e1; outline: none; background: white;">
  `;
          mainContent.after(filterBar);
          filterBar.querySelectorAll('input, select').forEach(el => el.addEventListener('input', applyDOMFilters));
        }
      };

      const observer = new MutationObserver(() => {
        injectFilters();
        document.querySelectorAll('.roll-card').forEach(card => {
          const idEL = card.querySelector('.roll-number');
          const idStr = idEL?.textContent.trim() || '';
          if (!idStr) return;

          // Inject QR Image into header if missing
          const header = card.querySelector('.roll-header');
          if (header && !card.querySelector('.roll-qr-img') && !card.querySelector('.roll-qr-fallback')) {
            const qrContainer = document.createElement('div');
            qrContainer.className = 'roll-qr-img';
            qrContainer.style.width = '64px';
            qrContainer.style.height = '64px';
            qrContainer.style.overflow = 'hidden';
            qrContainer.style.position = 'relative';

            const qrImg = document.createElement('img');
            qrImg.src = `/qrcodes/${idStr}.png?v=${Date.now()}`;
            qrImg.style.width = '100%';
            qrImg.style.height = '100%';
            qrImg.style.objectFit = 'contain';
            qrImg.alt = `QR ${idStr}`;

            // If QR doesn't exist yet, generate it
            qrImg.onerror = function () {
              this.style.display = 'none';

              // Create fallback container
              const fallback = document.createElement('div');
              fallback.className = 'roll-qr-fallback';
              fallback.style.width = '100%';
              fallback.style.height = '100%';
              fallback.style.backgroundColor = 'white';
              qrContainer.appendChild(fallback);

              // Construct basic payload
              let payload = { id: idStr, bin: window.rollBinMap[idStr] || '1' };
              if (window.allRolls) {
                const r = window.allRolls.find(x => x.id === idStr);
                if (r) {
                  const { quality_grade, material, ...rest } = r;
                  payload = rest;
                }
              }

              new QRCode(fallback, {
                text: JSON.stringify(payload),
                width: 64,
                height: 64,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
              });
            };
            qrContainer.appendChild(qrImg);
            header.appendChild(qrContainer);
          }

          const binNum = window.rollBinMap[idStr] || '';
          if (binNum) {
            card.setAttribute('data-bin', binNum);
            const details = card.querySelector('.roll-details') || card.querySelector('.roll-info');
            if (details && !card.querySelector('.bin-row')) {
              const binRow = document.createElement('div');
              binRow.className = 'detail-row bin-row';
              binRow.innerHTML = `<span class="detail-label">Bin:</span><span class="detail-value">${binNum}</span>`;
              if (details.firstChild) details.insertBefore(binRow, details.firstChild);
              else details.appendChild(binRow);
            }
          }

          // Cleanup display
          const typeEL = card.querySelector('.roll-type') || card.querySelector('.yarn-type');
          if (typeEL && typeEL.textContent.includes('[B')) {
            typeEL.textContent = typeEL.textContent.replace(/\[B+\d+\]\s*/, '');
          }
        });

        applyDOMFilters();

        const modal = document.querySelector('.modal-content');
        if (modal && (modal.textContent.includes('Register New Roll') || modal.textContent.includes('Add New Roll'))) {
          const rackInput = modal.querySelector('input[placeholder*="RACK"]');
          if (rackInput) { if (rackInput.value === 'STAGING') rackInput.value = ''; rackInput.placeholder = 'e.g. 1 or 2'; }
          if (!document.getElementById('injected-bin-group')) {
            const labels = Array.from(modal.querySelectorAll('label'));
            const rackLabel = labels.find(l => l.textContent.includes('Rack')) || labels[labels.length - 1];
            if (rackLabel) {
              const binGroup = document.createElement('div');
              binGroup.className = 'form-group'; binGroup.id = 'injected-bin-group';
              binGroup.innerHTML = `<label>Bin (1-9)</label><input type="number" id="in-bin" min="1" max="9" value="1"
    style="width: 100%; padding: 0.5rem; border-radius: 8px; border: 1px solid #cbd5e1;">`;
              rackLabel.parentElement.parentElement.appendChild(binGroup);
            }
          }
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    });

    const enhancedOriginalFetch = window.fetch;
    window.fetch = async function () {
      const url = arguments[0];
      const options = arguments[1];
      if (typeof url === 'string' && url.endsWith('/api/rolls') && (!options || options.method === 'GET')) {
        const response = await enhancedOriginalFetch.apply(this, arguments);
        const rolls = await response.json();
        const typeSelect = document.getElementById('filter-type');
        if (typeSelect && typeSelect.options.length === 1) {
          const types = [...new Set(rolls.map(r => r.yarn_type))].sort();
          types.forEach(t => {
            const opt = document.createElement('option'); opt.value = t; opt.textContent = t;
            typeSelect.appendChild(opt);
          });
        }
        // Map ID to Bin globally
        window.allRolls = rolls;
        rolls.forEach(r => { if (r.id) window.rollBinMap[r.id] = r.bin || '1'; });
        return new Response(JSON.stringify(rolls), { status: response.status, headers: response.headers });
      }
      if (typeof url === 'string' && (url.endsWith('/api/rolls') || url.endsWith('/api/test-rolls')) && options &&
        options.method === 'POST') {
        try {
          const body = JSON.parse(options.body);
          const binInput = document.getElementById('in-bin');
          if (binInput) body.bin = binInput.value || '1';
          options.body = JSON.stringify(body);
        } catch (e) { }
      }
      return enhancedOriginalFetch.apply(this, arguments);
    };

    // ============================================
    // PROFESSIONAL MODAL CONTROL SYSTEM
    // ============================================

    // Modal state management functions
    window.openModal = function () {
      document.body.classList.add("modal-open");
      const overlay = document.querySelector(".ui-overlay, .modal-overlay");
      const modal = document.querySelector(".ui-modal, .modal-content");
      if (overlay) overlay.style.display = "flex";
      if (modal) modal.style.display = "block";
    };

    window.closeModal = function () {
      document.body.classList.remove("modal-open");
      const overlay = document.querySelector(".ui-overlay, .modal-overlay");
      const modal = document.querySelector(".ui-modal, .modal-content");
      if (overlay) overlay.style.display = "none";
      if (modal) modal.style.display = "none";
    };

    // Auto-detect modal visibility changes and manage body class + force styles
    const modalObserver = new MutationObserver(() => {
      const overlay = document.querySelector(".modal-overlay");
      const modal = document.querySelector(".modal-content");

      // Force extreme z-index via inline styles to override React
      if (overlay) {
        overlay.style.zIndex = "9999999";
        overlay.style.position = "fixed";
        overlay.style.inset = "0";
        overlay.style.display = overlay.style.display || "flex";
        overlay.style.pointerEvents = "auto";
      }

      if (modal) {
        modal.style.zIndex = "10000000";
        modal.style.position = "fixed";
        modal.style.top = "50%";
        modal.style.left = "50%";
        modal.style.transform = "translate(-50%, -50%)";
        modal.style.pointerEvents = "auto";

        // Ensure all inputs/buttons inside modal are interactive
        modal.querySelectorAll('input, button, select, textarea, a').forEach(el => {
          el.style.pointerEvents = "auto";
        });
      }

      if (overlay && modal) {
        const overlayVisible = window.getComputedStyle(overlay).display !== 'none';
        const modalVisible = window.getComputedStyle(modal).display !== 'none';

        if (overlayVisible || modalVisible) {
          if (!document.body.classList.contains("modal-open")) {
            document.body.classList.add("modal-open");
          }
        } else {
          if (document.body.classList.contains("modal-open")) {
            document.body.classList.remove("modal-open");
          }
        }
      }
    });

    // Start observing when DOM is ready
    window.addEventListener('DOMContentLoaded', () => {
      modalObserver.observe(document.body, {
        childList: true,
        subtree: true,
        attributes: true,
        attributeFilter: ['style', 'class']
      });
    });
  </script>
</head>

<body class="flex flex-col min-h-screen">
  <div id="root" class="flex-1"></div>
</body>
