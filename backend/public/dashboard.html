<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Yarn | S.A. Textiles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, var(--surface-color), var(--bg-color));
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            background: rgba(0, 0, 0, 0.2);
        }
    </style>
    <link rel="stylesheet" href="/navbar.css">
    <script src="/navbar.js"></script>
</head>

<body class="flex flex-col min-h-screen">
    <div class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full">
            <div class="glass p-10 shadow-2xl">
                <div class="text-center mb-10">
                    <h1 class="text-4xl font-bold tracking-tight mb-2 text-slate-800">Place Order</h1>
                    <p class="text-slate-500">Enter your requirements below</p>
                </div>

                <form id="orderForm" class="space-y-6">
                    <div>
                        <label class="block text-slate-500 text-sm font-medium mb-2">Customer Name</label>
                        <input type="text" id="customer_name" required
                            class="w-full p-4 rounded-xl input-field focus:outline-none focus:ring-1 focus:ring-orange-500"
                            placeholder="e.g. S.A. Textiles Ltd.">
                    </div>

                    <div>
                        <label class="block text-slate-500 text-sm font-medium mb-2">Yarn Quality</label>
                        <select id="yarn_type" required
                            class="w-full p-4 rounded-xl input-field focus:outline-none focus:ring-1 focus:ring-orange-500 appearance-none">
                            <option value="Cotton 30s">Cotton 30s</option>
                            <option value="Cotton 40s">Cotton 40s</option>
                            <option value="Polyester Mix">Polyester Mix</option>
                            <option value="Silk Blend">Silk Blend</option>
                            <option value="Linen 20s">Linen 20s</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-slate-500 text-sm font-medium mb-2">Quantity (Rolls Required)</label>
                        <input type="number" id="quantity" required min="1"
                            class="w-full p-4 rounded-xl input-field focus:outline-none focus:ring-1 focus:ring-orange-500"
                            value="1">
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="submitBtn"
                            class="w-full py-4 btn-primary text-white font-bold rounded-xl shadow-lg flex justify-center items-center space-x-2">
                            <span>CONFIRM ORDER</span>
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                            </svg>
                        </button>
                    </div>
                </form>

                <div id="successMsg"
                    class="hidden mt-8 text-center p-6 bg-orange-100/50 border border-orange-200/50 rounded-2xl">
                    <div class="text-orange-600 font-bold mb-1">Order Placed Successfully!</div>
                    <p class="text-secondary text-sm">Waiting for admin approval. We will notify you soon.</p>
                    <button onclick="resetForm()" class="mt-4 text-sm text-accent hover:underline">Place another
                        order</button>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast"
            class="fixed bottom-8 right-8 transform translate-y-20 opacity-0 transition-all duration-300 glass border-orange-500 p-4 min-w-[300px] z-50 bg-white">
            <p id="toastMessage" class="text-slate-800 text-sm"></p>
        </div>

        <script>
            function showToast(message, isError = false) {
                const toast = document.getElementById('toast');
                const msg = document.getElementById('toastMessage');
                msg.innerText = message;
                toast.style.borderColor = isError ? '#f56565' : 'var(--accent)';
                toast.classList.remove('translate-y-20', 'opacity-0');
                setTimeout(() => {
                    toast.classList.add('translate-y-20', 'opacity-0');
                }, 3000);
            }

            function resetForm() {
                document.getElementById('orderForm').classList.remove('hidden');
                document.getElementById('successMsg').classList.add('hidden');
                document.getElementById('orderForm').reset();
            }

            document.getElementById('orderForm').onsubmit = async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submitBtn');
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Sending...';

                const data = {
                    customer_name: document.getElementById('customer_name').value,
                    yarn_type: document.getElementById('yarn_type').value,
                    quantity: document.getElementById('quantity').value
                };

                try {
                    const response = await fetch('/api/orders', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (response.ok) {
                        document.getElementById('orderForm').classList.add('hidden');
                        document.getElementById('successMsg').classList.remove('hidden');
                    } else {
                        const error = await response.json();
                        showToast(error.error || 'Failed to place order', true);
                        submitBtn.disabled = false;
                        submitBtn.innerHTML = 'CONFIRM ORDER';
                    }
                } catch (err) {
                    showToast('Network error', true);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'CONFIRM ORDER';
                }
            };
        </script>
</body>

</html>
