<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR for Testing | Yarn Roll Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/navbar.css">
    <script src="/navbar.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .main-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .qr-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .qr-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .qr-img {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            width: 100%;
            height: auto;
        }

        .test-badge {
            background: #f97316;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
            display: inline-block;
        }
    </style>
</head>

<body class="flex flex-col">
    <main class="main-container mx-auto w-full">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">QR for Testing</h1>
                <p class="text-slate-500">View temporary QR codes generated for testing purposes</p>
            </div>
            <div class="flex space-x-4">
                <button onclick="loadTestGallery()" class="p-3 glass-card hover:bg-white/10 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                        </path>
                    </svg>
                </button>
            </div>
        </div>

        <div id="testGalleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- QR Cards will be loaded here -->
            <div class="col-span-full text-center py-20 opacity-50">
                <div
                    class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-4">
                </div>
                Loading testing QR codes...
            </div>
        </div>
    </main>

    <script>
        async function loadTestGallery() {
            try {
                const response = await fetch('/api/test-rolls');
                const rolls = await response.json();
                renderGallery(rolls);
            } catch (err) {
                console.error(err);
            }
        }

        function renderGallery(rolls) {
            const container = document.getElementById('testGalleryGrid');
            if (rolls.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-20 text-gray-500 glass-card">
                        No testing QRs found. Create one from the Warehouse Inventory page.
                    </div>
                `;
                return;
            }

            container.innerHTML = rolls.map(roll => `
                <div class="qr-card">
                    <span class="test-badge">TEST ONLY</span>
                    <img src="/qrcodes/${roll.id}.png" alt="QR ${roll.id}" class="qr-img" onerror="this.src='https://via.placeholder.com/400?text=No+QR+Generated'">
                    <h3 class="font-bold text-slate-800 mb-1">${roll.id}</h3>
                    <p class="text-xs text-slate-500 mb-3">${roll.yarn_type}</p>
                    <div class="text-xs text-slate-400 font-mono">${new Date(roll.production_date).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }

        window.onload = loadTestGallery;
    </script>
</body>

</html>
