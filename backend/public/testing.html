<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR for Testing | Yarn Roll Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/navbar.css">
    <script src="/navbar.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .main-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .qr-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .qr-card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
        }

        .qr-img {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            width: 100%;
            height: auto;
        }

        .test-badge {
            background: #f97316;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
            display: inline-block;
        }
    </style>
</head>

<body class="flex flex-col">
    <main class="main-container mx-auto w-full">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">QR for Testing</h1>
                <p class="text-slate-500">View temporary QR codes generated for testing purposes</p>
            </div>
            <div class="flex space-x-4">
                <button onclick="clearAllTests()"
                    class="px-6 py-2 bg-red-50 text-red-600 border border-red-200 rounded-xl font-semibold hover:bg-red-100 transition-colors">
                    Clear All Tests
                </button>
                <a href="/index.html"
                    class="px-6 py-2 bg-slate-100 text-slate-700 rounded-xl font-semibold hover:bg-slate-200 transition-colors">Back
                    to app</a>
            </div>
        </div>

        <div id="testGalleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- QR Cards will be loaded here -->
            <div class="col-span-full text-center py-20 opacity-50">
                <div
                    class="w-10 h-10 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mx-auto mb-4">
                </div>
                Loading testing QR codes...
            </div>
        </div>
    </main>

    <script>
        async function deleteTest(id) {
            if (!confirm(`Delete test QR: ${id}?`)) return;
            try {
                const res = await fetch(`/api/test-rolls/${id}`, { method: 'DELETE' });
                if (res.ok) loadTestGallery();
            } catch (err) { alert('Failed to delete'); }
        }

        async function clearAllTests() {
            if (!confirm('Are you sure you want to delete ALL test QRs?')) return;
            try {
                const res = await fetch('/api/test-rolls', { method: 'DELETE' });
                if (res.ok) loadTestGallery();
            } catch (err) { alert('Failed to clear'); }
        }

        async function loadTestGallery() {
            try {
                const response = await fetch('/api/test-rolls');
                const rolls = await response.json();
                renderGallery(rolls);
            } catch (err) {
                console.error(err);
            }
        }

        function renderGallery(rolls) {
            const container = document.getElementById('testGalleryGrid');
            if (rolls.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-20 text-gray-500 glass-card">
                        No testing QRs found. Create one from the Warehouse Inventory page.
                    </div>
                `;
                return;
            }

            container.innerHTML = rolls.map(roll => `
                <div class="qr-card relative group">
                    <button onclick="deleteTest('${roll.id}')" class="absolute top-2 right-2 p-2 bg-white/80 text-red-500 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-sm hover:bg-red-50">
                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <span class="test-badge">TEST ONLY</span>
                    <img src="/qrcodes/${roll.id}.png" alt="QR ${roll.id}" class="qr-img" onerror="this.src='https://via.placeholder.com/400?text=No+QR+Generated'">
                    <h3 class="font-bold text-slate-800 mb-1 tracking-tight">${roll.id}</h3>
                    <div class="space-y-1 mb-3">
                        <p class="text-xs text-slate-500">${roll.yarn_type}</p>
                        <p class="text-xs font-bold text-blue-600">Bin: ${roll.bin || 'N/A'}</p>
                    </div>
                    <div class="text-[10px] text-slate-400 font-mono">${new Date(roll.production_date).toLocaleTimeString()}</div>
                </div>
            `).join('');
        }

        window.onload = loadTestGallery;
    </script>
</body>

</html>
