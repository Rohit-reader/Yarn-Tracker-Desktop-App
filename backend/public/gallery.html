<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Gallery | Yarn Roll Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/navbar.css">
    <script src="/navbar.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-color);
            color: var(--text-primary);
        }

        .main-container {
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .qr-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            text-align: center;
        }

        .qr-card:hover {
            transform: translateY(-5px);
        }

        .qr-img {
            background: white;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body class="flex flex-col">
    <main class="main-container mx-auto w-full">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-800">QR Identification Gallery</h1>
                <p class="text-slate-500">View and print QR codes for all yarn rolls</p>
            </div>
            <div class="flex flex-wrap items-center gap-3">
                <div class="relative" style="flex: 1; min-width: 200px;">
                    <input type="text" id="gallerySearch" placeholder="Search ID, Type..."
                        style="height: 42px; padding: 0 1rem 0 2.5rem;"
                        class="w-full border rounded-xl focus:ring-2 focus:ring-orange-500 outline-none box-sizing: border-box;">
                    <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <!-- Bin Input -->
                <input type="text" id="binFilter" placeholder="Bin" style="width: 80px; height: 42px;"
                    class="px-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 box-sizing: border-box;">

                <!-- Rack Input -->
                <input type="text" id="rackFilter" placeholder="Rack" style="width: 80px; height: 42px;"
                    class="px-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 box-sizing: border-box;">

                <!-- Type Select -->
                <select id="typeFilter" style="height: 42px; min-width: 150px; max-width: 200px;"
                    class="px-3 border rounded-xl outline-none focus:ring-2 focus:ring-orange-500 box-sizing: border-box;">
                    <option value="">All Types</option>
                </select>

                <button onclick="loadGallery()" style="height: 42px; width: 42px;"
                    class="bg-white border text-slate-600 hover:bg-slate-50 rounded-xl transition-colors flex items-center justify-center p-0"
                    title="Refresh Data">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                        </path>
                    </svg>
                </button>
                <button onclick="window.print()" style="height: 42px;"
                    class="bg-orange-600 hover:bg-orange-500 text-white px-6 rounded-xl font-bold flex items-center transition-colors">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z">
                        </path>
                    </svg>
                    Print
                </button>
            </div>
        </div>

        <div id="galleryGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- QR Cards will be loaded here -->
            <div class="col-span-full text-center py-20 opacity-50">
                <div
                    class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4">
                </div>
                Loading generated QR codes...
            </div>
        </div>
    </main>

    <script>
        let allRolls = [];

        async function loadGallery() {
            try {
                const response = await fetch('/api/rolls');
                allRolls = await response.json();
                renderGallery(allRolls);
            } catch (err) {
                console.error(err);
            }
        }

        function renderGallery(rolls) {
            const container = document.getElementById('galleryGrid');

            // Dynamic Type Dropdown Population
            const typeSelect = document.getElementById('typeFilter');
            if (typeSelect && typeSelect.options.length <= 1) {
                const types = [...new Set(allRolls.map(r => r.yarn_type).filter(t => t))];
                types.sort().forEach(t => {
                    const opt = document.createElement('option');
                    opt.value = t;
                    opt.textContent = t;
                    typeSelect.appendChild(opt);
                });
            }

            if (rolls.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500">No matching rolls found.</div>';
                return;
            }

            container.innerHTML = rolls.map(roll => `
                <div class="qr-card">
                    <div class="qr-container bg-white p-4 rounded-lg mb-4 w-full aspect-square flex items-center justify-center relative">
                         <img src="/qrcodes/${roll.id}.png?v=${Date.now()}" alt="QR ${roll.id}" class="w-full h-full object-contain" 
                            onerror="handleQRError(this, '${roll.id}')">
                         <div id="qr-${roll.id}" class="absolute inset-0 flex items-center justify-center bg-white hidden"></div>
                    </div>
                    <h3 class="font-bold text-slate-800 mb-1">${roll.id}</h3>
                    <div class="space-y-0.5 mb-2">
                        <p class="text-xs text-slate-500">${roll.yarn_type || 'N/A'}</p>
                        <p class="text-[10px] font-bold text-orange-600">BIN: ${roll.bin || '1'} | RACK: ${roll.rack_id || 'N/A'}</p>
                    </div>
                    <a href="/details.html?id=${roll.id}" class="text-orange-600 text-[10px] hover:underline font-bold uppercase tracking-wider">View Details</a>
                </div>
            `).join('');
        }

        function handleQRError(img, rollId) {
            const roll = allRolls.find(r => r.id === rollId);
            if (!roll) return;

            img.style.display = 'none';
            const fallbackContainer = document.getElementById(`qr-${rollId}`);
            fallbackContainer.classList.remove('hidden');

            // Exclude fields not needed in QR per server logic
            const { quality_grade, material, ...qrDataObj } = roll;

            new QRCode(fallbackContainer, {
                text: JSON.stringify(qrDataObj),
                width: 128,
                height: 128,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function applyFilters() {
            const search = document.getElementById('gallerySearch').value.toLowerCase();
            const bin = document.getElementById('binFilter').value.toLowerCase();
            const rack = document.getElementById('rackFilter').value.toLowerCase();
            const type = document.getElementById('typeFilter').value.toLowerCase();

            const filtered = allRolls.filter(roll => {
                const matchSearch = roll.id.toLowerCase().includes(search) ||
                    (roll.yarn_type || '').toLowerCase().includes(search);
                const matchBin = !bin || String(roll.bin || '').toLowerCase().includes(bin);
                const matchRack = !rack || String(roll.rack_id || '').toLowerCase().includes(rack);
                const matchType = !type || (roll.yarn_type || '').toLowerCase() === type;

                return matchSearch && matchBin && matchRack && matchType;
            });

            renderGallery(filtered);
        }

        document.getElementById('gallerySearch').addEventListener('input', applyFilters);
        document.getElementById('binFilter').addEventListener('input', applyFilters);
        document.getElementById('rackFilter').addEventListener('input', applyFilters);
        document.getElementById('typeFilter').addEventListener('change', applyFilters);

        window.onload = loadGallery;
    </script>
</body>

</html>
